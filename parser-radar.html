<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Радар запросов — MenClub Admin</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<style>
*{box-sizing:border-box}body{margin:0;background:#16181a;color:#e8eaed;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}.app{max-width:480px;margin:0 auto;min-height:100vh}.top{position:sticky;top:0;z-index:10;background:#16181a;border-bottom:1px solid rgba(45,212,191,.15);padding:14px 16px;display:flex;align-items:center;gap:12px}.back,.refresh{border:1px solid rgba(45,212,191,.15);background:#272a2e;color:#9aa0a6;border-radius:9px;padding:8px 10px;font-size:12px}.head{flex:1}.title{font-size:17px;font-weight:800}.sub{font-size:11px;color:#9aa0a6;margin-top:4px}.tabs{display:flex;gap:8px;padding:12px 16px}.tab{flex:1;border:1px solid rgba(45,212,191,.15);background:#272a2e;color:#9aa0a6;padding:11px 8px;border-radius:11px;font-size:12px;font-weight:700}.tab.active{background:rgba(45,212,191,.14);border-color:#2dd4bf;color:#5eead4}.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:0 16px 12px}.metric{background:#272a2e;border:1px solid rgba(45,212,191,.12);border-radius:12px;padding:10px}.metric b{font-size:20px;color:#5eead4;display:block}.metric span{font-size:9px;color:#5f6368;text-transform:uppercase}.filters,.session-form{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 16px 12px}.filters.hidden,.session-form.hidden{display:none}.filters select,.filters input,.session-form input,.session-form select{width:100%;background:#272a2e;color:#e8eaed;border:1px solid rgba(45,212,191,.15);border-radius:10px;padding:10px;font-size:12px}.session-form .wide{grid-column:1/-1}.session-form button{grid-column:1/-1;border:1px solid rgba(45,212,191,.25);background:rgba(45,212,191,.14);color:#5eead4;border-radius:10px;padding:11px;font-size:12px;font-weight:800}.list{padding:0 16px 24px}.card{background:#272a2e;border:1px solid rgba(45,212,191,.12);border-radius:14px;padding:14px;margin-bottom:10px}.row{display:flex;justify-content:space-between;gap:10px}.source{font-size:10px;color:#5f6368}.score,.pill{font-size:11px;font-weight:800;padding:4px 8px;border-radius:999px;background:rgba(224,168,58,.14);color:#e0a83a}.pill.ok{background:rgba(45,212,191,.14);color:#5eead4}.pill.err{background:rgba(224,85,85,.14);color:#e07080}.text{font-size:14px;line-height:1.45;margin:10px 0}.meta{font-size:10px;color:#9aa0a6;line-height:1.45}.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px}.chip{font-size:9px;padding:4px 7px;border-radius:999px;background:#1e2124;color:#9aa0a6}.actions{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:12px}.actions button{border:1px solid rgba(45,212,191,.15);background:#1e2124;color:#9aa0a6;border-radius:9px;padding:9px;font-size:11px}.actions button.primary{background:rgba(45,212,191,.14);color:#5eead4}.empty{text-align:center;color:#5f6368;padding:48px 16px;font-size:13px;line-height:1.6}.notice{margin:0 16px 12px;padding:10px 12px;background:rgba(45,212,191,.08);border:1px solid rgba(45,212,191,.2);border-radius:11px;color:#5eead4;font-size:11px;line-height:1.45}.notice.error{background:rgba(224,85,85,.08);border-color:rgba(224,85,85,.2);color:#e07080}
</style>
</head>
<body><main class="app">
<header class="top"><button class="back" id="back">←</button><div class="head"><div class="title">📡 Радар запросов</div><div class="sub">Сигналы и Parser Sessions · production API</div></div><button class="refresh" id="refresh">↻</button></header>
<div class="tabs"><button class="tab active" data-mode="signals" data-stream="menclub">🦁 MenClub</button><button class="tab" data-mode="signals" data-stream="work">💼 Работа</button><button class="tab" data-mode="sessions">⚙️ Сессии</button></div>
<div class="metrics"><div class="metric"><b id="m-total">0</b><span id="l-total">всего</span></div><div class="metric"><b id="m-new">0</b><span id="l-new">новых</span></div><div class="metric"><b id="m-hot">0</b><span id="l-hot">горячих</span></div></div>
<div class="notice" id="notice">Проверяю parser runtime…</div>
<div class="filters" id="signal-filters"><input id="q" placeholder="Поиск по тексту"><select id="status"><option value="all">Все статусы</option><option value="new">Новые</option><option value="reviewed">Просмотрены</option><option value="in_progress">В работе</option><option value="converted">Конвертированы</option><option value="irrelevant">Неактуальные</option></select><select id="priority"><option value="all">Любой приоритет</option><option value="hot">Горячие</option><option value="warm">Тёплые</option><option value="cold">Холодные</option></select><select id="period"><option value="7">7 дней</option><option value="30">30 дней</option><option value="all">Всё время</option></select></div>
<form class="session-form hidden" id="session-form"><input id="s-name" placeholder="Название сессии"><input id="s-account" placeholder="Telegram account id"><input class="wide" id="s-keywords" placeholder="Ключевые слова через запятую"><button>Создать draft-сессию</button></form>
<form class="session-form hidden" id="chat-form"><input id="c-chat" placeholder="chatId"><input id="c-title" placeholder="Название чата"><select id="c-type"><option value="controlled_test">controlled_test</option><option value="menclub_owned">menclub_owned</option><option value="partner_approved">partner_approved</option><option value="consent_recorded">consent_recorded</option></select><select id="c-enabled"><option value="true">enabled</option><option value="false">disabled</option></select><input class="wide" id="c-evidence" placeholder="approval evidence"><button>Добавить whitelist-чат к выбранной сессии</button></form>
<section class="list" id="list"></section>
</main>
<script>
const AUTH_SERVER='https://llobychev-manproduction-networking-server-6f2d.twc1.net';
const firebaseConfig={apiKey:'AIzaSyD195j33cTr6labXodSH_jTeZsvs4L3U4w',authDomain:'manproduction-club.firebaseapp.com',projectId:'manproduction-club',storageBucket:'manproduction-club.firebasestorage.app',messagingSenderId:'962650441642',appId:'1:962650441642:web:1be30d07d1ca62058c0dd3'};
let mode='signals',stream='menclub',items=[],sessions=[],selectedSessionId='',idToken='';
firebase.initializeApp(firebaseConfig);
const esc=s=>String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
const notice=(text,error)=>{const el=document.getElementById('notice');el.textContent=text;el.classList.toggle('error',!!error)};
function classifyScore(x){if((x.score||0)>=80)return'hot';if((x.score||0)>=50)return'warm';return'cold'}
function setMetricLabels(a,b,c){document.getElementById('l-total').textContent=a;document.getElementById('l-new').textContent=b;document.getElementById('l-hot').textContent=c}
async function raw(path,options={}){const res=await fetch(AUTH_SERVER+path,options);const data=await res.json().catch(()=>({}));if(!res.ok)throw new Error(data.error||('HTTP '+res.status));return data}
async function api(path,options={}){const headers=Object.assign({'Content-Type':'application/json','Authorization':'Bearer '+idToken},options.headers||{});return raw(path,Object.assign({},options,{headers}))}
async function authenticate(){const health=await raw('/internal/v1/intent-signals/health');if(!health.ok||!health.configured)throw new Error('Parser runtime не активирован в Timeweb');const tg=window.Telegram&&Telegram.WebApp;if(tg){tg.ready();tg.expand()}if(!tg||!tg.initData)throw new Error('Открой радар через Telegram-админку');const data=await raw('/auth/admin',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({initData:tg.initData})});if(!data.token)throw new Error('Не удалось получить Admin token');const cred=await firebase.auth().signInWithCustomToken(data.token);idToken=await cred.user.getIdToken();notice('Parser '+(health.parserVersion||'')+' подключён. Автоматических сообщений людям нет.');}
async function load(){if(!idToken)return;if(mode==='sessions')return loadSessions();notice('Обновляю сигналы…');try{const data=await api('/admin/v1/intent-signals?stream='+encodeURIComponent(stream)+'&limit=200');items=data.items||[];notice('Загружено сигналов: '+items.length);renderSignals()}catch(e){notice(e.message,true);items=[];renderSignals()}}
async function loadSessions(){notice('Обновляю Parser Sessions…');try{const data=await api('/admin/v1/parser-sessions?limit=100');sessions=data.items||[];if(!selectedSessionId&&sessions[0])selectedSessionId=sessions[0].id;notice('Загружено сессий: '+sessions.length);renderSessions()}catch(e){notice(e.message,true);sessions=[];renderSessions()}}
function filtered(){const q=document.getElementById('q').value.trim().toLowerCase(),status=document.getElementById('status').value,priority=document.getElementById('priority').value,period=document.getElementById('period').value,cutoff=period==='all'?0:Date.now()-Number(period)*86400000;return items.filter(x=>(!q||String(x.text||'').toLowerCase().includes(q))&&(status==='all'||(x.status||'new')===status)&&(priority==='all'||classifyScore(x)===priority)&&(!cutoff||Number(x.detectedAt||0)>=cutoff))}
function renderSignals(){document.getElementById('signal-filters').classList.remove('hidden');document.getElementById('session-form').classList.add('hidden');document.getElementById('chat-form').classList.add('hidden');setMetricLabels('всего','новых','горячих');const data=filtered();document.getElementById('m-total').textContent=items.length;document.getElementById('m-new').textContent=items.filter(x=>(x.status||'new')==='new').length;document.getElementById('m-hot').textContent=items.filter(x=>classifyScore(x)==='hot').length;const wrap=document.getElementById('list');if(!data.length){wrap.innerHTML='<div class="empty">Сигналов по текущему фильтру пока нет.</div>';return}wrap.innerHTML=data.map(x=>`<article class="card"><div class="row"><div class="source">${esc(x.sourceTitle||x.sourceType||'Telegram')} · ${new Date(Number(x.detectedAt||Date.now())).toLocaleString('ru-RU')}</div><div class="score">${Number(x.score||0)}%</div></div><div class="text">${esc(x.text)}</div><div class="meta">${esc(x.authorName||x.authorUsername||'Автор скрыт')} · ${esc(x.intent||'не классифицировано')} · ${esc(x.status||'new')}</div><div class="chips">${(x.tags||[]).map(t=>`<span class="chip">${esc(t)}</span>`).join('')}</div><div class="actions"><button data-id="${x.id}" data-status="reviewed">Просмотрено</button><button class="primary" data-id="${x.id}" data-status="in_progress">В работу</button><button data-id="${x.id}" data-status="converted">Конвертирован</button><button data-id="${x.id}" data-status="irrelevant">Неактуально</button></div></article>`).join('');wrap.querySelectorAll('button[data-id]').forEach(b=>b.onclick=()=>updateStatus(b.dataset.id,b.dataset.status))}
function renderSessions(){document.getElementById('signal-filters').classList.add('hidden');document.getElementById('session-form').classList.remove('hidden');document.getElementById('chat-form').classList.toggle('hidden',!selectedSessionId);setMetricLabels('сессий','running','ошибок');document.getElementById('m-total').textContent=sessions.length;document.getElementById('m-new').textContent=sessions.filter(x=>x.status==='running'||x.runtimeStatus==='running').length;document.getElementById('m-hot').textContent=sessions.filter(x=>x.status==='error'||x.runtimeStatus==='error').length;const wrap=document.getElementById('list');if(!sessions.length){wrap.innerHTML='<div class="empty">Parser Sessions пока нет. Создай первую draft-сессию.</div>';return}wrap.innerHTML=sessions.map(s=>`<article class="card"><div class="row"><div class="source">${esc(s.telegramAccountId||'telegram account не задан')}</div><div class="pill ${s.status==='error'?'err':'ok'}">${esc(s.status||'draft')}</div></div><div class="text">${esc(s.name)}</div><div class="meta">desired: ${esc(s.desiredStatus)} · runtime: ${esc(s.runtimeStatus)} · threshold: ${Number(s.confidenceThreshold||0)}%</div><div class="chips"><span class="chip">keywords: ${(s.keywords||[]).length}</span><span class="chip">phrases: ${(s.phrases||[]).length}</span><span class="chip">signals: ${Number((s.statistics||{}).signalsCreated||0)}</span></div><div class="actions"><button class="${selectedSessionId===s.id?'primary':''}" data-select="${s.id}">Whitelist</button><button data-session="${s.id}" data-desired="running">Запуск</button><button data-session="${s.id}" data-desired="paused">Пауза</button><button data-session="${s.id}" data-desired="stopped">Стоп</button></div></article>`).join('');wrap.querySelectorAll('button[data-select]').forEach(b=>b.onclick=()=>{selectedSessionId=b.dataset.select;renderSessions()});wrap.querySelectorAll('button[data-session]').forEach(b=>b.onclick=()=>setDesiredStatus(b.dataset.session,b.dataset.desired))}
async function updateStatus(id,status){try{await api('/admin/v1/intent-signals/'+encodeURIComponent(id)+'/status',{method:'PATCH',body:JSON.stringify({status})});await load()}catch(e){notice(e.message,true)}}
async function setDesiredStatus(id,desiredStatus){try{const session=sessions.find(x=>x.id===id)||{};await api('/admin/v1/parser-sessions/'+encodeURIComponent(id),{method:'PATCH',body:JSON.stringify({...session,desiredStatus})});await loadSessions()}catch(e){notice(e.message,true)}}
document.getElementById('session-form').onsubmit=async e=>{e.preventDefault();try{const keywords=document.getElementById('s-keywords').value.split(',').map(x=>x.trim()).filter(Boolean);await api('/admin/v1/parser-sessions',{method:'POST',body:JSON.stringify({name:document.getElementById('s-name').value,telegramAccountId:document.getElementById('s-account').value,keywords,desiredStatus:'draft',status:'draft',runtimeStatus:'idle'})});e.target.reset();await loadSessions()}catch(err){notice(err.message,true)}};
document.getElementById('chat-form').onsubmit=async e=>{e.preventDefault();if(!selectedSessionId)return notice('Сначала выбери Parser Session',true);try{await api('/admin/v1/parser-sessions/'+encodeURIComponent(selectedSessionId)+'/chats',{method:'POST',body:JSON.stringify({chatId:document.getElementById('c-chat').value,title:document.getElementById('c-title').value,enabled:document.getElementById('c-enabled').value==='true',sourceType:document.getElementById('c-type').value,approvalStatus:'approved',approvalEvidence:document.getElementById('c-evidence').value})});e.target.reset();notice('Whitelist-чат добавлен к выбранной сессии')}catch(err){notice(err.message,true)}};
document.getElementById('back').onclick=()=>{if(history.length>1)history.back();else location.href='index.html'};document.getElementById('refresh').onclick=load;document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));b.classList.add('active');mode=b.dataset.mode||'signals';if(b.dataset.stream)stream=b.dataset.stream;load()});['q','status','priority','period'].forEach(id=>document.getElementById(id).addEventListener(id==='q'?'input':'change',renderSignals));
authenticate().then(load).catch(e=>notice(e.message,true));
</script></body></html>
