<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Радар запросов — MenClub Admin</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
*{box-sizing:border-box}body{margin:0;background:#16181a;color:#e8eaed;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}.app{max-width:480px;margin:0 auto;min-height:100vh}.top{position:sticky;top:0;z-index:10;background:#16181a;border-bottom:1px solid rgba(45,212,191,.15);padding:16px}.title{font-size:17px;font-weight:800}.sub{font-size:11px;color:#9aa0a6;margin-top:4px}.tabs{display:flex;gap:8px;padding:12px 16px}.tab{flex:1;border:1px solid rgba(45,212,191,.15);background:#272a2e;color:#9aa0a6;padding:11px 8px;border-radius:11px;font-size:12px;font-weight:700}.tab.active{background:rgba(45,212,191,.14);border-color:#2dd4bf;color:#5eead4}.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:0 16px 12px}.metric{background:#272a2e;border:1px solid rgba(45,212,191,.12);border-radius:12px;padding:10px}.metric b{font-size:20px;color:#5eead4;display:block}.metric span{font-size:9px;color:#5f6368;text-transform:uppercase}.filters{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 16px 12px}.filters select,.filters input{width:100%;background:#272a2e;color:#e8eaed;border:1px solid rgba(45,212,191,.15);border-radius:10px;padding:10px;font-size:12px}.list{padding:0 16px 24px}.card{background:#272a2e;border:1px solid rgba(45,212,191,.12);border-radius:14px;padding:14px;margin-bottom:10px}.row{display:flex;justify-content:space-between;gap:10px}.source{font-size:10px;color:#5f6368}.score{font-size:11px;font-weight:800;padding:4px 8px;border-radius:999px;background:rgba(224,168,58,.14);color:#e0a83a}.text{font-size:14px;line-height:1.45;margin:10px 0}.meta{font-size:10px;color:#9aa0a6;line-height:1.45}.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px}.chip{font-size:9px;padding:4px 7px;border-radius:999px;background:#1e2124;color:#9aa0a6}.actions{display:flex;gap:7px;margin-top:12px}.actions button{flex:1;border:1px solid rgba(45,212,191,.15);background:#1e2124;color:#9aa0a6;border-radius:9px;padding:9px;font-size:11px}.actions button.primary{background:rgba(45,212,191,.14);color:#5eead4}.empty{text-align:center;color:#5f6368;padding:48px 16px;font-size:13px;line-height:1.6}.notice{margin:0 16px 12px;padding:10px 12px;background:rgba(224,168,58,.08);border:1px solid rgba(224,168,58,.2);border-radius:11px;color:#e0a83a;font-size:11px;line-height:1.45}
</style>
</head>
<body><main class="app">
<header class="top"><div class="title">📡 Радар запросов</div><div class="sub">Два независимых потока: MenClub и рабочие лиды</div></header>
<div class="tabs"><button class="tab active" data-stream="menclub">🦁 MenClub</button><button class="tab" data-stream="work">💼 Работа</button></div>
<div class="metrics"><div class="metric"><b id="m-total">0</b><span>всего</span></div><div class="metric"><b id="m-new">0</b><span>новых</span></div><div class="metric"><b id="m-hot">0</b><span>горячих</span></div></div>
<div class="notice">Экран уже использует production-ready контракт коллекции <b>intent_signals</b>. До подключения Telegram ingestion показывает безопасное пустое состояние.</div>
<div class="filters"><input id="q" placeholder="Поиск по тексту"><select id="status"><option value="all">Все статусы</option><option value="new">Новые</option><option value="reviewed">Просмотрены</option><option value="actioned">В работе</option><option value="ignored">Неактуальные</option></select><select id="priority"><option value="all">Любой приоритет</option><option value="hot">Горячие</option><option value="warm">Тёплые</option><option value="cold">Холодные</option></select><select id="period"><option value="7">7 дней</option><option value="30">30 дней</option><option value="all">Всё время</option></select></div>
<section class="list" id="list"></section>
</main>
<script>
const firebaseConfig={apiKey:'AIzaSyBXF3xz2wU5dZClGdDrzX5i5NX8iU6G5kM',authDomain:'manclub-project.firebaseapp.com',projectId:'manclub-project',storageBucket:'manclub-project.firebasestorage.app',messagingSenderId:'699356133706',appId:'1:699356133706:web:98f7f6d35e6c8f7580c80a'};
let db=null,stream='menclub',items=[];
try{firebase.initializeApp(firebaseConfig);db=firebase.firestore();}catch(e){console.warn(e)}
const esc=s=>String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
function classifyScore(x){if((x.score||0)>=80)return'hot';if((x.score||0)>=50)return'warm';return'cold'}
function load(){if(!db){items=[];render();return}db.collection('intent_signals').where('stream','==',stream).orderBy('detectedAt','desc').limit(200).get().then(s=>{items=[];s.forEach(d=>items.push({_id:d.id,...d.data()}));render()}).catch(e=>{console.warn(e);items=[];render()})}
function filtered(){const q=document.getElementById('q').value.trim().toLowerCase(),status=document.getElementById('status').value,priority=document.getElementById('priority').value,period=document.getElementById('period').value,cutoff=period==='all'?0:Date.now()-Number(period)*86400000;return items.filter(x=>(!q||String(x.text||'').toLowerCase().includes(q))&&(status==='all'||(x.status||'new')===status)&&(priority==='all'||classifyScore(x)===priority)&&(!cutoff||Number(x.detectedAt||0)>=cutoff))}
function render(){const data=filtered();document.getElementById('m-total').textContent=items.length;document.getElementById('m-new').textContent=items.filter(x=>(x.status||'new')==='new').length;document.getElementById('m-hot').textContent=items.filter(x=>classifyScore(x)==='hot').length;const wrap=document.getElementById('list');if(!data.length){wrap.innerHTML='<div class="empty">Пока нет найденных запросов.<br>После подключения Telegram ingestion сигналы появятся здесь автоматически.</div>';return}wrap.innerHTML=data.map(x=>`<article class="card"><div class="row"><div class="source">${esc(x.sourceTitle||x.sourceType||'Telegram')} · ${new Date(Number(x.detectedAt||Date.now())).toLocaleString('ru-RU')}</div><div class="score">${Number(x.score||0)}%</div></div><div class="text">${esc(x.text)}</div><div class="meta">${esc(x.authorName||x.authorUsername||'Автор скрыт')} · ${esc(x.intent||'не классифицировано')}</div><div class="chips">${(x.tags||[]).map(t=>`<span class="chip">${esc(t)}</span>`).join('')}</div><div class="actions"><button data-id="${x._id}" data-status="reviewed">Просмотрено</button><button class="primary" data-id="${x._id}" data-status="actioned">В работу</button><button data-id="${x._id}" data-status="ignored">Неактуально</button></div></article>`).join('');wrap.querySelectorAll('button[data-id]').forEach(b=>b.onclick=()=>updateStatus(b.dataset.id,b.dataset.status))}
function updateStatus(id,status){if(!db)return;db.collection('intent_signals').doc(id).update({status,reviewedAt:Date.now()}).then(load)}
document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));b.classList.add('active');stream=b.dataset.stream;load()});['q','status','priority','period'].forEach(id=>document.getElementById(id).addEventListener(id==='q'?'input':'change',render));
load();
</script></body></html>
