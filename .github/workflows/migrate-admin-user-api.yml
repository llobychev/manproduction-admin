name: Migrate Admin user mutations

on:
  push:
    branches:
      - security/use-admin-user-api-v1
    paths:
      - .github/workflows/migrate-admin-user-api.yml

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: security/use-admin-user-api-v1
          fetch-depth: 0

      - name: Replace direct Firestore admin mutations
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import re

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')

          anchor = "function approveRequest(id,role){"
          if text.count(anchor) != 1:
              raise SystemExit(f'Expected one approveRequest, found {text.count(anchor)}')

          helper = r'''function adminUserApiRequest(method,path,body){
  var user=firebase.auth().currentUser;
  if(!user)return Promise.reject(new Error('Нет подтверждённой Admin-сессии'));
  return user.getIdToken().then(function(token){
    return fetch(AUTH_SERVER+path,{
      method:method,
      headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'},
      body:body?JSON.stringify(body):undefined
    });
  }).then(function(res){
    return res.json().catch(function(){return {};}).then(function(data){
      if(!res.ok)throw new Error((data&&data.error)||('HTTP '+res.status));
      return data;
    });
  });
}

'''

          text = text.replace(anchor, helper + anchor, 1)

          patterns = {
            r"function approveRequest\(id,role\)\{.*?\n\}": r'''function approveRequest(id,role){
  adminUserApiRequest('POST','/admin/v1/users/'+encodeURIComponent(id)+'/approve',{role:role}).then(function(){
    showToast('Одобрено');loadRequestsAndUsers();
  }).catch(function(err){console.warn(err);showToast(err.message||'Ошибка');});
}''',
            r"function rejectRequest\(id\)\{.*?\n\}": r'''function rejectRequest(id){
  adminUserApiRequest('POST','/admin/v1/users/'+encodeURIComponent(id)+'/reject').then(function(){
    showToast('Отклонено');loadRequestsAndUsers();
  }).catch(function(err){console.warn(err);showToast(err.message||'Ошибка');});
}''',
            r"function removeUser\(id\)\{.*?\n\}": r'''function removeUser(id){
  adminUserApiRequest('DELETE','/admin/v1/users/'+encodeURIComponent(id)).then(function(){
    showToast('Удалено');loadRequestsAndUsers();
  }).catch(function(err){console.warn(err);showToast(err.message||'Ошибка');});
}'''
          }

          for pattern, replacement in patterns.items():
              text, count = re.subn(pattern, replacement, text, count=1, flags=re.S)
              if count != 1:
                  raise SystemExit(f'Expected one replacement for {pattern}, got {count}')

          forbidden = [
            "fbDb.collection('admin_users').doc(id).update({status:'approved'",
            "fbDb.collection('admin_users').doc(id).update({status:'rejected'",
            "fbDb.collection('admin_users').doc(id).delete()"
          ]
          for value in forbidden:
              if value in text:
                  raise SystemExit('Legacy direct mutation remains: '+value)

          required = [
            "'/admin/v1/users/'+encodeURIComponent(id)+'/approve'",
            "'/admin/v1/users/'+encodeURIComponent(id)+'/reject'",
            "'/admin/v1/users/'+encodeURIComponent(id)",
            "getIdToken()",
            "'Authorization':'Bearer '+token"
          ]
          for value in required:
              if value not in text:
                  raise SystemExit('Required migration marker missing: '+value)

          path.write_text(text, encoding='utf-8')
          PY

      - name: Commit migration
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html
          git commit -m 'security: route admin user mutations through backend API'
          git push origin HEAD:security/use-admin-user-api-v1
