name: Migrate Admin user mutations to backend API

on:
  push:
    branches:
      - security/use-admin-user-api-v1
    paths:
      - .github/workflows/migrate-admin-user-api.yml
      - index.html
  workflow_dispatch:

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout migration branch
        uses: actions/checkout@v4
        with:
          ref: security/use-admin-user-api-v1
          fetch-depth: 0

      - name: Patch index.html
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import re

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')

          if "function adminUserApiRequest(method,path,body){" in text:
              print('Migration already applied')
              raise SystemExit(0)

          helper = """function adminUserApiRequest(method,path,body){
            var user=firebase.auth().currentUser;
            if(!user)return Promise.reject(new Error('Нет подтверждённой Admin-сессии'));
            return user.getIdToken().then(function(token){
              return fetch(AUTH_SERVER+path,{
                method:method,
                headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'},
                body:body?JSON.stringify(body):undefined
              });
            }).then(function(res){
              return res.json().catch(function(){return {};}).then(function(data){
                if(!res.ok)throw new Error((data&&data.error)||('HTTP '+res.status));
                return data;
              });
            });
          }

          """

          marker = "function approveRequest(id,role){"
          if text.count(marker) != 1:
              raise SystemExit(f'approveRequest marker count: {text.count(marker)}')
          text = text.replace(marker, helper + marker, 1)

          replacements = [
              (r"function approveRequest\(id,role\)\{.*?\n\}", """function approveRequest(id,role){
            adminUserApiRequest('POST','/admin/v1/users/'+encodeURIComponent(id)+'/approve',{role:role}).then(function(){
              showToast('Одобрено');loadRequestsAndUsers();
            }).catch(function(err){console.warn(err);showToast(err.message||'Ошибка');});
          }"""),
              (r"function rejectRequest\(id\)\{.*?\n\}", """function rejectRequest(id){
            adminUserApiRequest('POST','/admin/v1/users/'+encodeURIComponent(id)+'/reject').then(function(){
              showToast('Отклонено');loadRequestsAndUsers();
            }).catch(function(err){console.warn(err);showToast(err.message||'Ошибка');});
          }"""),
              (r"function removeUser\(id\)\{.*?\n\}", """function removeUser(id){
            adminUserApiRequest('DELETE','/admin/v1/users/'+encodeURIComponent(id)).then(function(){
              showToast('Удалено');loadRequestsAndUsers();
            }).catch(function(err){console.warn(err);showToast(err.message||'Ошибка');});
          }""")
          ]

          for pattern, replacement in replacements:
              text, count = re.subn(pattern, replacement, text, count=1, flags=re.S)
              if count != 1:
                  raise SystemExit(f'Replacement count {count}: {pattern}')

          forbidden = [
              "fbDb.collection('admin_users').doc(id).update({status:'approved'",
              "fbDb.collection('admin_users').doc(id).update({status:'rejected'",
              "fbDb.collection('admin_users').doc(id).delete()"
          ]
          for item in forbidden:
              if item in text:
                  raise SystemExit(f'Legacy mutation remains: {item}')

          required = [
              "getIdToken()",
              "'Authorization':'Bearer '+token",
              "'/admin/v1/users/'+encodeURIComponent(id)+'/approve'",
              "'/admin/v1/users/'+encodeURIComponent(id)+'/reject'"
          ]
          for item in required:
              if item not in text:
                  raise SystemExit(f'Required migration fragment missing: {item}')

          path.write_text(text, encoding='utf-8')
          PY

      - name: Commit migration when changed
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- index.html; then
            echo 'No index.html changes to commit'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html
          git commit -m 'security: use backend API for admin user mutations'
          git push origin HEAD:security/use-admin-user-api-v1
