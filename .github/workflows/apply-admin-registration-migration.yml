name: Apply Admin registration API migration

on:
  issues:
    types: [opened]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  migrate:
    if: github.event_name == 'workflow_dispatch' || github.event.issue.title == 'RUN_ADMIN_REGISTRATION_MIGRATION'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: security/use-admin-registration-api-v1
          fetch-depth: 0
      - name: Replace direct registration write
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          path=Path('index.html')
          text=path.read_text(encoding='utf-8')
          old="""function submitRegistration(){
            var name=document.getElementById('reg-name').value.trim();
            if(!name){showToast('Введи имя');return;}
            if(!fbDb){showToast('Нет подключения к базе');return;}
            var data={id:myTgId,name:name,role:'pending_role',status:'pending',requestedAt:Date.now()};
            fbDb.collection('admin_users').doc(myTgId).set(data).then(function(){
              myUser=data;
              showPendingScreen();
            }).catch(function(err){
              console.warn(err);
              showToast('Ошибка отправки заявки');
            });
          }"""
          new="""function submitRegistration(){
            var name=document.getElementById('reg-name').value.trim();
            if(!name){showToast('Введи имя');return;}
            var initData=(window.Telegram&&Telegram.WebApp&&Telegram.WebApp.initData)||'';
            if(!initData){showToast('Открой админку через Telegram');return;}
            fetch(AUTH_SERVER+'/admin/v1/registration',{
              method:'POST',
              headers:{'Content-Type':'application/json'},
              body:JSON.stringify({initData:initData,name:name})
            }).then(function(res){
              return res.json().catch(function(){return {};}).then(function(data){
                if(!res.ok)throw new Error((data&&data.error)||('HTTP '+res.status));
                return data;
              });
            }).then(function(data){
              myUser={id:String(data.uid||myTgId),name:name,role:'pending_role',status:'pending'};
              showPendingScreen();
            }).catch(function(err){
              console.warn(err);
              showToast(err.message||'Ошибка отправки заявки');
            });
          }"""
          if old not in text: raise SystemExit('legacy submitRegistration block not found')
          text=text.replace(old,new,1)
          if "fbDb.collection('admin_users').doc(myTgId).set(data)" in text: raise SystemExit('legacy registration write remains')
          if "/admin/v1/registration" not in text: raise SystemExit('registration endpoint missing')
          path.write_text(text,encoding='utf-8')
          PY
      - name: Commit migration branch
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html
          git commit -m 'security: submit Admin registration through backend API'
          git push origin HEAD:security/use-admin-registration-api-v1
