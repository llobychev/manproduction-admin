name: Patch challenges permissions

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/patch-challenges-permissions.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply challenges permission enforcement
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')
          marker = '/* ===== PERMISSION MATRIX V1 ===== */'
          block_marker = '/* ===== CHALLENGES PERMISSION ENFORCEMENT V1 ===== */'

          if block_marker not in text:
              block = r'''
/* ===== CHALLENGES PERMISSION ENFORCEMENT V1 ===== */
(function(){
  function isChallengesOwner(){
    return String(myTgId||'')===String(SUPER_ADMIN_ID||'')||(myUser&&myUser.role==='owner');
  }
  function challengePermissionValue(action){
    if(isChallengesOwner())return true;
    var raw=myUser&&myUser.permissions&&myUser.permissions.admin&&myUser.permissions.admin.challenges;
    if(raw&&typeof raw==='object'){
      if(typeof raw[action]==='boolean')return raw[action];
      if(typeof raw.manage==='boolean'&&action!=='view')return raw.manage;
      if(typeof raw.view==='boolean')return action==='view'?raw.view:false;
    }
    if(typeof raw==='boolean')return raw;
    return !!(myUser&&['admin','content_editor'].indexOf(myUser.role)!==-1);
  }
  function hasChallengePermission(action){return challengePermissionValue(action||'view');}
  window.hasChallengePermission=hasChallengePermission;

  function applyChallengesLock(){
    var screen=document.getElementById('s-challenges');
    if(!screen)return;
    var old=screen.querySelector('.permission-lock-overlay');
    if(old)old.remove();
    screen.classList.remove('permission-lock-host');
    Array.prototype.forEach.call(screen.children,function(el){el.classList.remove('permission-lock-content');});
    if(hasChallengePermission('view'))return;
    screen.classList.add('permission-lock-host');
    Array.prototype.forEach.call(screen.children,function(el){el.classList.add('permission-lock-content');});
    var overlay=document.createElement('div');
    overlay.className='permission-lock-overlay';
    overlay.innerHTML='<div class="permission-lock-card"><div class="permission-lock-icon">🔒</div><div class="permission-lock-title">Раздел недоступен</div><div class="permission-lock-text">У вас нет прав на раздел «Челленджи». Обратитесь к администратору проекта, чтобы получить доступ.</div></div>';
    screen.appendChild(overlay);
  }
  window.applyChallengesLock=applyChallengesLock;

  var oldCanSeeChallenges=canSeeManageItem;
  canSeeManageItem=function(item){if(item&&item.id==='challenges')return true;return oldCanSeeChallenges(item);};

  var oldChallengesManageHtml=manageItemHtml;
  manageItemHtml=function(item,pinned){
    var html=oldChallengesManageHtml(item,pinned);
    if(item&&item.id==='challenges'&&!hasChallengePermission('view'))html=html.replace('manage-hub-item ','manage-hub-item permission-locked ');
    return html;
  };

  var oldChallengesSwitch=switchTab;
  switchTab=function(tab){oldChallengesSwitch(tab);if(tab==='challenges')setTimeout(applyChallengesLock,0);};

  var oldChallengesLaunch=launchApp;
  launchApp=function(){oldChallengesLaunch();setTimeout(function(){try{renderManageHub();}catch(e){}applyChallengesLock();},0);};

  var originalLoadChallenges=loadChallenges;
  loadChallenges=function(){
    if(!hasChallengePermission('view')){
      challengeItems=[];
      var list=document.getElementById('challenges-list');
      if(list)list.innerHTML='';
      applyChallengesLock();
      return;
    }
    return originalLoadChallenges();
  };

  var originalRenderChallenges=renderChallenges;
  renderChallenges=function(){
    originalRenderChallenges();
    var canEdit=hasChallengePermission('edit');
    var list=document.getElementById('challenges-list');
    if(list&&!canEdit){
      Array.prototype.forEach.call(list.querySelectorAll('[data-act="edit"]'),function(btn){btn.style.display='none';});
    }
    var fab=document.querySelector('#s-challenges .add-fab');
    if(fab)fab.style.display=hasChallengePermission('create')?'flex':'none';
  };

  var originalOpenChallengeModal=openChallengeModal;
  openChallengeModal=function(id){
    var action=id?'edit':'create';
    if(!hasChallengePermission(action)){showToast(id?'Нет права на редактирование челленджей':'Нет права на создание челленджей');return;}
    originalOpenChallengeModal(id);
    var del=document.getElementById('challenge-btn-delete');
    if(del&&id)del.style.display=hasChallengePermission('delete')?'block':'none';
  };

  var originalSaveChallenge=saveChallenge;
  saveChallenge=function(){
    var action=editingChallengeId?'edit':'create';
    if(!hasChallengePermission(action)){showToast(editingChallengeId?'Нет права на редактирование челленджей':'Нет права на создание челленджей');return;}
    return originalSaveChallenge();
  };

  var originalDeleteChallenge=deleteChallenge;
  deleteChallenge=function(){
    if(!hasChallengePermission('delete')){showToast('Нет права на удаление челленджей');return;}
    if(!editingChallengeId)return;
    if(!confirm('Удалить челлендж?'))return;
    return originalDeleteChallenge();
  };
})();
/* ===== END CHALLENGES PERMISSION ENFORCEMENT V1 ===== */

'''
              if marker not in text:
                  raise SystemExit('Permission matrix marker not found')
              text = text.replace(marker, block + marker, 1)

          old = "onAdmin(['news','channels','campaigns','contentFactory','tasks','training','instructions','stats']);"
          new = "onAdmin(['news','challenges','channels','campaigns','contentFactory','tasks','training','instructions','stats']);"
          if old in text:
              text = text.replace(old, new, 1)

          path.write_text(text, encoding='utf-8')
          PY
      - name: Validate JavaScript
        run: |
          python3 - <<'PY'
          import re
          from pathlib import Path
          html=Path('index.html').read_text(encoding='utf-8')
          scripts=re.findall(r'<script(?:\s[^>]*)?>(.*?)</script>',html,re.S|re.I)
          Path('/tmp/admin-scripts.js').write_text('\n'.join(scripts),encoding='utf-8')
          PY
          node --check /tmp/admin-scripts.js
      - name: Commit patched index
        run: |
          if git diff --quiet -- index.html; then
            echo 'No changes needed'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html
          git commit -m 'Enforce challenge permissions [skip ci]'
          git push
