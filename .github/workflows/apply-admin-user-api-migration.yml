name: Apply Admin user API migration

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  migrate:
    if: github.event_name == 'workflow_dispatch' || github.head_ref == 'security/use-admin-user-api-v1'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout migration branch
        uses: actions/checkout@v4
        with:
          ref: security/use-admin-user-api-v1
          fetch-depth: 0

      - name: Replace direct Firestore admin mutations
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')

          if "function adminUserApiRequest(method,path,body){" in text:
              print('Migration already applied')
              raise SystemExit(0)

          old = """function approveRequest(id,role){
            fbDb.collection('admin_users').doc(id).update({status:'approved',role:role,approvedAt:Date.now()}).then(function(){
              showToast('Одобрено');loadRequestsAndUsers();
            }).catch(function(err){console.warn(err);showToast('Ошибка');});
          }
          function rejectRequest(id){
            fbDb.collection('admin_users').doc(id).update({status:'rejected'}).then(function(){
              showToast('Отклонено');loadRequestsAndUsers();
            }).catch(function(err){console.warn(err);showToast('Ошибка');});
          }
          function removeUser(id){
            fbDb.collection('admin_users').doc(id).delete().then(function(){
              showToast('Удалено');loadRequestsAndUsers();
            }).catch(function(err){console.warn(err);showToast('Ошибка');});
          }"""

          new = """function adminUserApiRequest(method,path,body){
            var user=firebase.auth().currentUser;
            if(!user)return Promise.reject(new Error('Нет подтверждённой Admin-сессии'));
            return user.getIdToken().then(function(token){
              return fetch(AUTH_SERVER+path,{
                method:method,
                headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'},
                body:body?JSON.stringify(body):undefined
              });
            }).then(function(res){
              return res.json().catch(function(){return {};}).then(function(data){
                if(!res.ok)throw new Error((data&&data.error)||('HTTP '+res.status));
                return data;
              });
            });
          }
          function approveRequest(id,role){
            adminUserApiRequest('POST','/admin/v1/users/'+encodeURIComponent(id)+'/approve',{role:role}).then(function(){
              showToast('Одобрено');loadRequestsAndUsers();
            }).catch(function(err){console.warn(err);showToast(err.message||'Ошибка');});
          }
          function rejectRequest(id){
            adminUserApiRequest('POST','/admin/v1/users/'+encodeURIComponent(id)+'/reject').then(function(){
              showToast('Отклонено');loadRequestsAndUsers();
            }).catch(function(err){console.warn(err);showToast(err.message||'Ошибка');});
          }
          function removeUser(id){
            adminUserApiRequest('DELETE','/admin/v1/users/'+encodeURIComponent(id)).then(function(){
              showToast('Удалено');loadRequestsAndUsers();
            }).catch(function(err){console.warn(err);showToast(err.message||'Ошибка');});
          }"""

          if text.count(old) != 1:
              raise SystemExit(f'Expected exact legacy block once, found {text.count(old)}')
          text = text.replace(old, new, 1)

          forbidden = [
            "fbDb.collection('admin_users').doc(id).update({status:'approved'",
            "fbDb.collection('admin_users').doc(id).update({status:'rejected'",
            "fbDb.collection('admin_users').doc(id).delete()"
          ]
          for value in forbidden:
              if value in text:
                  raise SystemExit('Legacy direct mutation remains: '+value)

          required = [
            "function adminUserApiRequest(method,path,body){",
            "getIdToken()",
            "'Authorization':'Bearer '+token",
            "'/admin/v1/users/'+encodeURIComponent(id)+'/approve'",
            "'/admin/v1/users/'+encodeURIComponent(id)+'/reject'",
            "adminUserApiRequest('DELETE','/admin/v1/users/'+encodeURIComponent(id))"
          ]
          for value in required:
              if value not in text:
                  raise SystemExit('Required migration marker missing: '+value)

          path.write_text(text, encoding='utf-8')
          PY

      - name: Commit migration branch
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- index.html; then
            echo 'No changes required'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html
          git commit -m 'security: route admin user mutations through backend API'
          git push origin HEAD:security/use-admin-user-api-v1
