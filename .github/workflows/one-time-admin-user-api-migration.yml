name: One-time Admin user API migration

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/one-time-admin-user-api-migration.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: security/use-admin-user-api-v1
          fetch-depth: 0
      - name: Patch Admin App
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import re
          path=Path('index.html')
          text=path.read_text(encoding='utf-8')
          if "function adminUserApiRequest(method,path,body){" in text:
              print('Migration already applied')
              raise SystemExit(0)
          anchor="function approveRequest(id,role){"
          if text.count(anchor)!=1: raise SystemExit('approveRequest marker mismatch')
          helper="""function adminUserApiRequest(method,path,body){
            var user=firebase.auth().currentUser;
            if(!user)return Promise.reject(new Error('Нет подтверждённой Admin-сессии'));
            return user.getIdToken().then(function(token){
              return fetch(AUTH_SERVER+path,{method:method,headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'},body:body?JSON.stringify(body):undefined});
            }).then(function(res){
              return res.json().catch(function(){return {};}).then(function(data){if(!res.ok)throw new Error((data&&data.error)||('HTTP '+res.status));return data;});
            });
          }

          """
          text=text.replace(anchor,helper+anchor,1)
          replacements=[
          (r"function approveRequest\(id,role\)\{.*?\n\}","""function approveRequest(id,role){
            adminUserApiRequest('POST','/admin/v1/users/'+encodeURIComponent(id)+'/approve',{role:role}).then(function(){showToast('Одобрено');loadRequestsAndUsers();}).catch(function(err){console.warn(err);showToast(err.message||'Ошибка');});
          }"""),
          (r"function rejectRequest\(id\)\{.*?\n\}","""function rejectRequest(id){
            adminUserApiRequest('POST','/admin/v1/users/'+encodeURIComponent(id)+'/reject').then(function(){showToast('Отклонено');loadRequestsAndUsers();}).catch(function(err){console.warn(err);showToast(err.message||'Ошибка');});
          }"""),
          (r"function removeUser\(id\)\{.*?\n\}","""function removeUser(id){
            adminUserApiRequest('DELETE','/admin/v1/users/'+encodeURIComponent(id)).then(function(){showToast('Удалено');loadRequestsAndUsers();}).catch(function(err){console.warn(err);showToast(err.message||'Ошибка');});
          }""")]
          for pattern,repl in replacements:
              text,n=re.subn(pattern,repl,text,count=1,flags=re.S)
              if n!=1: raise SystemExit('replacement mismatch: '+pattern)
          for legacy in ["fbDb.collection('admin_users').doc(id).update({status:'approved'","fbDb.collection('admin_users').doc(id).update({status:'rejected'","fbDb.collection('admin_users').doc(id).delete()"]:
              if legacy in text: raise SystemExit('legacy mutation remains: '+legacy)
          path.write_text(text,encoding='utf-8')
          PY
      - name: Commit migration
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- index.html; then exit 0; fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html
          git commit -m 'security: use backend API for admin user mutations'
          git push origin HEAD:security/use-admin-user-api-v1
