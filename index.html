<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ManClub Team</title>
<style>
html,body{height:100%;margin:0;background:#16181a;color:#e8eaed;font-family:-apple-system,'SF Pro Display',BlinkMacSystemFont,sans-serif}.boot{height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px}.logo{font-size:14px;font-weight:700;letter-spacing:.12em;color:#2dd4bf;text-transform:uppercase}.spin{width:30px;height:30px;border:2px solid rgba(45,212,191,.2);border-top-color:#2dd4bf;border-radius:50%;animation:spin .8s linear infinite}.error{max-width:360px;padding:24px;text-align:center;line-height:1.5;color:#9aa0a6}.error b{display:block;color:#e8eaed;margin-bottom:8px}@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="boot" id="boot"><div class="logo">ManClub Team</div><div class="spin"></div></div>
<script>
(function(){
  'use strict';
  var SOURCE='admin-app.html?v=20260721-authfix2';
  var OLD_SERVER='https://llobychev-manproduction-networking-server-6f2d.twc1.net';
  var ACTIVE_SERVER='https://llobychev-manproduction-networking-server-0fdf.twc1.net';
  var AUTH_OPEN_MARKER="xhr.open('POST',AUTH_SERVER+'/auth/admin',true);";
  var AUTH_OPEN_PATCH=AUTH_OPEN_MARKER+"\n  xhr.timeout=10000;\n  xhr.ontimeout=function(){console.warn('Auth request timeout');callback();};";
  var LOAD_OPEN_MARKER="window.addEventListener('load',function(){";
  var LOAD_OPEN_PATCH="function __adminAppBoot(){\n  if(window.__adminAppBooted)return;\n  window.__adminAppBooted=true;";
  var LOAD_CLOSE_MARKER="  });\n});\n\nfunction showScreen(id){";
  var LOAD_CLOSE_PATCH="  });\n}\n\nfunction showScreen(id){";
  var BODY_CLOSE_MARKER='</body>';
  var BOOT_CALL='<script>__adminAppBoot();<\\/script>\n</body>';

  function requireMarker(html,marker,label){
    if(html.indexOf(marker)===-1)throw new Error('Missing '+label+' marker');
  }

  fetch(SOURCE,{cache:'no-store'})
    .then(function(response){
      if(!response.ok)throw new Error('HTTP '+response.status);
      return response.text();
    })
    .then(function(html){
      requireMarker(html,OLD_SERVER,'retired backend');
      requireMarker(html,AUTH_OPEN_MARKER,'auth request');
      requireMarker(html,LOAD_OPEN_MARKER,'load open');
      requireMarker(html,LOAD_CLOSE_MARKER,'load close');
      requireMarker(html,BODY_CLOSE_MARKER,'body close');

      html=html.split(OLD_SERVER).join(ACTIVE_SERVER);
      html=html.replace(AUTH_OPEN_MARKER,AUTH_OPEN_PATCH);
      html=html.replace(LOAD_OPEN_MARKER,LOAD_OPEN_PATCH);
      html=html.replace(LOAD_CLOSE_MARKER,LOAD_CLOSE_PATCH);
      html=html.replace(BODY_CLOSE_MARKER,BOOT_CALL);

      document.open();
      document.write(html);
      document.close();
    })
    .catch(function(error){
      console.error('Admin bootstrap failed',error);
      document.getElementById('boot').innerHTML='<div class="error"><b>Не удалось загрузить админку</b>Закрой Mini App и открой её снова. Если ошибка повторится, сообщи администратору.</div>';
    });
})();
</script>
</body>
</html>
