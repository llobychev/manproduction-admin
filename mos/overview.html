<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>MenClub Operating System — Overview</title>
  <style>
    :root{--bg:#07111f;--panel:#0f1b2d;--panel2:#13243a;--text:#eef3f8;--muted:#94a3b8;--gold:#c9a84c;--green:#35c98b;--yellow:#f3b63f;--red:#ef5b5b;--line:#24364f}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.shell{max-width:1240px;margin:0 auto;padding:28px}.top{display:flex;justify-content:space-between;gap:20px;align-items:flex-start;margin-bottom:24px}.eyebrow{color:var(--gold);font-size:12px;letter-spacing:.14em;text-transform:uppercase;font-weight:800}.title{font-size:30px;margin:6px 0 4px}.muted{color:var(--muted)}.badge{padding:8px 12px;border-radius:999px;background:#362b12;color:#ffd86a;font-weight:800;font-size:13px}.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:16px}.card{background:linear-gradient(180deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:18px;padding:18px}.summary{grid-column:span 12}.services{grid-column:span 8}.attention{grid-column:span 4}.statrow{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-top:16px}.stat{background:#0b1727;border:1px solid var(--line);border-radius:14px;padding:14px}.stat strong{display:block;font-size:24px}.status-list{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:14px}.service{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 14px;background:#0b1727;border:1px solid var(--line);border-radius:13px}.dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:8px}.green{background:var(--green)}.yellow{background:var(--yellow)}.red{background:var(--red)}.planned{background:#7891b3}.incident{padding:13px 0;border-bottom:1px solid var(--line)}.incident:last-child{border-bottom:0}.incident b{display:block;margin-bottom:5px}.severity{font-size:11px;font-weight:900;letter-spacing:.08em;text-transform:uppercase}.critical{color:#ff8080}.high{color:#ffc95c}.footer-note{margin-top:18px;font-size:13px;color:var(--muted)}.error{padding:16px;border:1px solid #7f1d1d;background:#2b1118;border-radius:14px;color:#fecaca}.loading{padding:30px;text-align:center;color:var(--muted)}@media(max-width:900px){.services,.attention{grid-column:span 12}.statrow{grid-template-columns:repeat(2,1fr)}.status-list{grid-template-columns:1fr}.top{flex-direction:column}}
  </style>
</head>
<body>
  <main class="shell">
    <div class="top">
      <div><div class="eyebrow">MenClub Operating System</div><h1 class="title">Overview</h1><div class="muted">Read-only состояние платформы</div></div>
      <div id="overallBadge" class="badge">Загрузка…</div>
    </div>
    <div id="app" class="loading">Получаю данные MOS…</div>
  </main>
  <script src="overview.js"></script>
</body>
</html>
